<style>
  :root{
    --bg:#05060d;
    --bg-2:#0a0d1c;
    --neon:#00f0ff;
    --neon-2:#a855f7;
    --neon-3:#ff2bd6;
    --accent:#39ff14;
    --text:#e7eaf3;
    --muted:#9aa3b2;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.12);
  }
  [data-theme="light"]{
    --bg:#eef1fa;
    --bg-2:#ffffff;
    --neon:#0066ff;
    --neon-2:#7c3aed;
    --neon-3:#ec4899;
    --text:#0a0d1c;
    --muted:#475569;
    --glass:rgba(0,0,0,0.04);
    --glass-border:rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;scroll-behavior:smooth}
  h1,h2,h3,.font-display{font-family:'Orbitron',sans-serif;letter-spacing:.5px}

  .gradient-bg{
    background:
      radial-gradient(circle at 10% 20%, rgba(0,240,255,.18) 0, transparent 40%),
      radial-gradient(circle at 90% 30%, rgba(168,85,247,.20) 0, transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(255,43,214,.15) 0, transparent 50%),
      var(--bg);
  }

  .glass{
    background:var(--glass);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:18px;
  }
  .glass-strong{
    background:rgba(10,13,28,0.78);
    backdrop-filter:blur(22px) saturate(180%);
    -webkit-backdrop-filter:blur(22px) saturate(180%);
    border:1px solid var(--glass-border);
  }
  [data-theme="light"] .glass-strong{background:rgba(255,255,255,.92)}

  .neon-text{
    background:linear-gradient(90deg,var(--neon),var(--neon-2),var(--neon-3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    background-size:200% 100%;
    animation:gradMove 6s linear infinite;
  }
  @keyframes gradMove{0%{background-position:0 0}100%{background-position:200% 0}}

  .btn-neon{
    position:relative;display:inline-flex;align-items:center;gap:.5rem;
    padding:.75rem 1.4rem;border-radius:999px;
    background:linear-gradient(90deg,var(--neon),var(--neon-2));
    color:#000;font-weight:700;cursor:pointer;border:none;
    transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
    box-shadow:0 8px 24px rgba(0,240,255,.35);
  }
  .btn-neon:hover{transform:translateY(-2px) scale(1.03);filter:brightness(1.1);box-shadow:0 12px 36px rgba(168,85,247,.5)}
  .btn-ghost{
    padding:.6rem 1.1rem;border-radius:999px;border:1px solid var(--glass-border);
    background:var(--glass);color:var(--text);font-weight:600;cursor:pointer;
    transition:all .25s ease;
  }
  .btn-ghost:hover{border-color:var(--neon);color:var(--neon);box-shadow:0 0 24px rgba(0,240,255,.25)}

  .nav-link{position:relative;padding:.5rem .25rem;color:var(--text);opacity:.85;font-weight:500;cursor:pointer;transition:.25s}
  .nav-link:hover{opacity:1;color:var(--neon)}
  .nav-link::after{content:"";position:absolute;left:0;bottom:-4px;width:0;height:2px;background:linear-gradient(90deg,var(--neon),var(--neon-2));transition:width .3s}
  .nav-link:hover::after{width:100%}

  .product-card{
    position:relative;border-radius:22px;overflow:hidden;
    background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.08);
    transition:transform .35s ease, box-shadow .35s ease;
  }
  .product-card:hover{box-shadow:0 30px 80px rgba(0,240,255,.18),0 0 60px rgba(168,85,247,.18)}
  .product-card .img-wrap{
    position:relative;height:220px;overflow:hidden;border-radius:18px;
    background:linear-gradient(135deg,#fff,#f3f4f6);
    display:flex;align-items:center;justify-content:center;
  }
  .product-card .img-wrap img{
    width:100%;height:100%;object-fit:contain;padding:14px;
    transition:transform .5s ease;
  }
  .product-card:hover .img-wrap img{transform:scale(1.08) rotate(-2deg)}

  .floating{animation:float 6s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  #loader{position:fixed;inset:0;z-index:9999;background:#03040a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;transition:opacity .8s ease}
  .loader-cube{width:80px;height:80px;perspective:600px;transform-style:preserve-3d;animation:cubeSpin 3s linear infinite}
  .loader-cube .face{position:absolute;width:80px;height:80px;border:2px solid var(--neon);background:rgba(0,240,255,.08);box-shadow:0 0 20px rgba(0,240,255,.5)}
  @keyframes cubeSpin{0%{transform:rotateX(0) rotateY(0)}100%{transform:rotateX(360deg) rotateY(360deg)}}
  .f1{transform:translateZ(40px)}.f2{transform:rotateY(180deg) translateZ(40px)}
  .f3{transform:rotateY(90deg) translateZ(40px)}.f4{transform:rotateY(-90deg) translateZ(40px)}
  .f5{transform:rotateX(90deg) translateZ(40px)}.f6{transform:rotateX(-90deg) translateZ(40px)}

  #heroCanvas{position:absolute;inset:0;z-index:0}
  .hero-content{position:relative;z-index:2}

  .cat-card{
    position:relative;height:220px;border-radius:22px;cursor:pointer;
    background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.08);
    transition:transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s;
    overflow:hidden;
  }
  .cat-card:hover{transform:translateY(-10px) rotateX(8deg) rotateY(-8deg);box-shadow:0 30px 60px rgba(0,240,255,.25),0 0 50px rgba(168,85,247,.2)}
  .cat-card .icon-3d{font-size:60px;filter:drop-shadow(0 10px 30px rgba(0,240,255,.5));transition:transform .5s}
  .cat-card:hover .icon-3d{transform:translateY(-8px) scale(1.1)}

  .toast{position:fixed;top:90px;right:20px;z-index:1000;padding:.9rem 1.2rem;border-radius:14px;display:flex;align-items:center;gap:.6rem;transform:translateX(120%);transition:transform .4s ease}
  .toast.show{transform:translateX(0)}

  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(420px,100%);z-index:900;transform:translateX(100%);transition:transform .45s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:899;opacity:0;pointer-events:none;transition:opacity .35s}
  .overlay.show{opacity:1;pointer-events:auto}

  .modal{position:fixed;inset:0;z-index:950;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex}
  .modal-card{max-width:1000px;width:100%;max-height:92vh;overflow:auto;border-radius:22px}

  .section-title{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:800}

  .input{
    width:100%;padding:.8rem 1rem;border-radius:12px;background:rgba(255,255,255,.04);
    border:1px solid var(--glass-border);color:var(--text);outline:none;transition:.25s;
    font-family:inherit;
  }
  .input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,240,255,.15)}
  .label{font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.35rem;display:block;text-transform:uppercase;letter-spacing:.08em}

  .tab{padding:.6rem 1rem;border-radius:10px;cursor:pointer;font-weight:600;color:var(--muted);transition:.25s}
  .tab.active{background:linear-gradient(90deg,var(--neon),var(--neon-2));color:#000}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:linear-gradient(var(--neon),var(--neon-2));border-radius:10px}

  .wa-float{position:fixed;bottom:20px;right:20px;z-index:800;width:60px;height:60px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;box-shadow:0 10px 30px rgba(37,211,102,.5);animation:pulseWa 2.4s infinite;text-decoration:none}
  @keyframes pulseWa{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}50%{box-shadow:0 0 0 18px rgba(37,211,102,0)}}

  .marquee{overflow:hidden;white-space:nowrap;border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border);padding:.8rem 0}
  .marquee-track{display:inline-flex;gap:3rem;animation:scrollX 26s linear infinite}
  @keyframes scrollX{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  .badge{display:inline-flex;align-items:center;gap:.45rem;padding:.35rem .8rem;border-radius:999px;background:rgba(0,240,255,.1);border:1px solid rgba(0,240,255,.3);color:var(--neon);font-size:.8rem;font-weight:600}

  .carousel{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:1rem;scrollbar-width:none}
  .carousel::-webkit-scrollbar{display:none}
  .carousel > *{scroll-snap-align:start;flex:0 0 auto}

  .page{animation:fadeUp .6s cubic-bezier(.2,.8,.2,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

  .stars{color:#ffd54f;letter-spacing:1px}
  .heart-btn{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);color:#fff;cursor:pointer;border:1px solid rgba(255,255,255,.15);transition:.25s;z-index:5}
  .heart-btn.active{color:#ff2bd6;background:rgba(255,43,214,.15);border-color:#ff2bd6}

  .admin-stat{padding:1.2rem;border-radius:16px;border:1px solid var(--glass-border);background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01))}

  .reveal{opacity:0;transform:translateY(40px);transition:opacity .8s ease, transform .8s ease}
  .reveal.in{opacity:1;transform:translateY(0)}

  .ring{position:absolute;border:1px dashed rgba(0,240,255,.3);border-radius:50%;animation:rotateRing 30s linear infinite}
  @keyframes rotateRing{to{transform:rotate(360deg)}}

  .product-detail-img{
    width:100%;height:480px;border-radius:22px;
    background:linear-gradient(135deg,#fff,#f3f4f6);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    position:relative;
  }
  .product-detail-img img{
    width:100%;height:100%;object-fit:contain;padding:30px;
    transition:transform .5s ease;
  }
  .product-detail-img:hover img{transform:scale(1.06)}

  .thumb{
    width:80px;height:80px;border-radius:12px;background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;border:2px solid transparent;transition:.25s;overflow:hidden;
  }
  .thumb img{width:100%;height:100%;object-fit:contain;padding:6px}
  .thumb.active{border-color:var(--neon);box-shadow:0 0 18px rgba(0,240,255,.4)}

  @media (max-width: 768px){
    .product-detail-img{height:340px}
    .cat-card{height:180px}
  }
</style>

function load(key,def){ try{ const v = localStorage.getItem(key); return v?JSON.parse(v):def }catch(e){return def} }
function save(key,val){ localStorage.setItem(key,JSON.stringify(val)) }
function pkr(n){ return '₨ ' + Number(n).toLocaleString('en-PK') }

  products: load(STORAGE.products, DEFAULT_PRODUCTS),

  wishlist: load(STORAGE.wishlist, []),
  orders: load(STORAGE.orders, []),
  user: load(STORAGE.user, null),
  users: load(STORAGE.users, []),
  theme: load(STORAGE.theme, 'dark'),
  lang: load(STORAGE.lang, 'EN'),
  adminLogged: load(STORAGE.admin, false),
  adminCreds: load(STORAGE.adminCreds, MASTER_ADMIN),

  currentRoute:'home',

/* TOAST */
let toastTO;
function toast(msg){
  document.getElementById('toastMsg').textContent = msg;
  const t=document.getElementById('toast'); t.classList.add('show');
  clearTimeout(toastTO); toastTO=setTimeout(()=>t.classList.remove('show'),2400);
}

/* THREE.JS HERO */
function disposeAllThree(){
  state.threeInstances.forEach(inst=>{
    try{
      cancelAnimationFrame(inst.raf);
      inst.renderer.dispose();
      inst.renderer.forceContextLoss && inst.renderer.forceContextLoss();
      if(inst.renderer.domElement && inst.renderer.domElement.parentNode){
        inst.renderer.domElement.parentNode.removeChild(inst.renderer.domElement);
      }
    }catch(e){}
  });
  state.threeInstances = [];
}

function initHero3D(){
  const canvas = document.getElementById('heroCanvas');
  if(!canvas) return;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, 0.1, 100);
  camera.position.set(0,0,6);
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

  scene.add(new THREE.AmbientLight(0xffffff,.5));
  const d1 = new THREE.DirectionalLight(0x00f0ff, 1.4); d1.position.set(5,5,5); scene.add(d1);
  const d2 = new THREE.DirectionalLight(0xa855f7, 1.0); d2.position.set(-5,-3,4); scene.add(d2);

  // Decorative rotating geometry
  const g1 = new THREE.IcosahedronGeometry(1.4,1);
  const m1 = new THREE.MeshStandardMaterial({color:0x0a0d1c, metalness:.85, roughness:.2, wireframe:true, emissive:0x00f0ff, emissiveIntensity:.5});
  const ico = new THREE.Mesh(g1,m1); ico.position.set(-2.4,0.8,0); scene.add(ico);

  const g2 = new THREE.TorusKnotGeometry(0.7,0.22,128,16);
  const m2 = new THREE.MeshStandardMaterial({color:0xa855f7, metalness:.7, roughness:.25, emissive:0xa855f7, emissiveIntensity:.3});
  const knot = new THREE.Mesh(g2,m2); knot.position.set(2.4,-0.6,0); scene.add(knot);

  const g3 = new THREE.OctahedronGeometry(0.6,0);
  const m3 = new THREE.MeshStandardMaterial({color:0xff2bd6, metalness:.8, roughness:.2, emissive:0xff2bd6, emissiveIntensity:.4});
  const oct = new THREE.Mesh(g3,m3); oct.position.set(2.6,1.5,0); scene.add(oct);

  const partGeo = new THREE.BufferGeometry();
  const N = 600;
  const positions = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    positions[i*3]=(Math.random()-0.5)*20;
    positions[i*3+1]=(Math.random()-0.5)*12;
    positions[i*3+2]=(Math.random()-0.5)*10-2;
  }
  partGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const partMat = new THREE.PointsMaterial({color:0x00f0ff, size:0.04, transparent:true, opacity:.6});
  const points = new THREE.Points(partGeo, partMat); scene.add(points);

  const onResize=()=>{
    if(!canvas.parentNode) return;
    const w=canvas.clientWidth,h=canvas.clientHeight;
    if(w&&h){renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
  };
  window.addEventListener('resize', onResize);

  let mx=0,my=0;
  window.addEventListener('mousemove',e=>{
    mx=(e.clientX/window.innerWidth-.5)*0.6;
    my=(e.clientY/window.innerHeight-.5)*0.4;
  });

  const inst={renderer, raf:null, onResize};
  state.threeInstances.push(inst);
  function animate(){
    inst.raf=requestAnimationFrame(animate);
    ico.rotation.x+=0.005; ico.rotation.y+=0.008;
    knot.rotation.x+=0.01; knot.rotation.y+=0.012;
    oct.rotation.x-=0.012; oct.rotation.y+=0.015;
    points.rotation.y+=0.0008;
    camera.position.x+=(mx*1.2-camera.position.x)*0.05;
    camera.position.y+=(-my*0.8-camera.position.y)*0.05;
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
  }
  animate();
  setTimeout(onResize,100);
}

/* ROUTER */
function navigate(route, param){
  state.currentRoute = route;
  closeDrawer(); closeModal(); disposeAllThree();
  document.getElementById('mobileMenu').classList.add('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
  if(route==='home') renderHome();
  else if(route==='shop'){ if(param) state.filter.category=param; renderShop(); }
  else if(route==='product') renderProduct(param);
  else if(route==='admin') renderAdmin();
  else if(route==='checkout') renderCheckout();
  else if(route==='orders') renderOrders();
  else if(route==='contact') renderContact();
  else renderHome();
  renderFooter();
  initRevealAnimations();
}

/* HOME */
function renderHome(){

/* PRODUCT CARD */
function productCardHTML(p){

  const img = p.image || (p.images && p.images[0]) || '';
  return `
  <div class="product-card p-4 reveal" data-id="${p.id}">
    <button class="heart-btn ${inWish?'active':''}" onclick="event.stopPropagation();toggleWish('${p.id}', this)"><i class="fa-solid fa-heart"></i></button>
    <div class="img-wrap" onclick="navigate('product','${p.id}')">
      <img src="${img}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x400/1a1d2e/00f0ff?text=${encodeURIComponent(p.brand)}'">
      ${p.oldPrice && p.oldPrice>p.price ? `<span class="absolute top-2 left-2 text-[10px] font-bold px-2 py-1 rounded-full" style="background:linear-gradient(90deg,var(--neon-3),var(--neon-2));color:#fff">-${Math.round((1-p.price/p.oldPrice)*100)}%</span>`:''}
    </div>
    <div class="text-xs text-gray-400 uppercase tracking-wider mt-3">${p.brand} • ${p.category}</div>
    <h3 class="font-semibold mt-1 line-clamp-2 cursor-pointer hover:text-cyan-300" onclick="navigate('product','${p.id}')">${p.name}</h3>
    <div class="stars text-sm mt-1">${'★'.repeat(Math.round(p.rating))}<span class="text-gray-400 text-xs ml-1">(${p.rating})</span></div>
    <div class="flex items-center justify-between mt-3">
      <div>
        <div class="font-display text-lg neon-text">${pkr(p.price)}</div>

    </div>
  </div>
  `;
}

function applyFilter(){
  state.filter.category = document.getElementById('fCat').value;
  state.filter.brand = document.getElementById('fBrand').value;
  state.filter.min = +document.getElementById('fMin').value || 0;
  state.filter.max = +document.getElementById('fMax').value || 1e9;
  renderShopGrid();
}
function resetFilter(){
  state.filter = {category:'',brand:'',min:0,max:1000000,sort:'latest',q:''};
  renderShop();
}
function renderShopGrid(){
  let list = state.products.slice();
  const f = state.filter;
  if(f.category) list = list.filter(p=>p.category===f.category);
  if(f.brand) list = list.filter(p=>p.brand===f.brand);
  if(f.min) list = list.filter(p=>p.price>=f.min);
  if(f.max) list = list.filter(p=>p.price<=f.max);
  if(f.q){ const q=f.q.toLowerCase(); list = list.filter(p=> (p.name+' '+p.brand+' '+p.category).toLowerCase().includes(q)); }
  if(f.sort==='lowhigh') list.sort((a,b)=>a.price-b.price);
  else if(f.sort==='highlow') list.sort((a,b)=>b.price-a.price);
  else if(f.sort==='rating') list.sort((a,b)=>b.rating-a.rating);

  const grid = document.getElementById('shopGrid');
  if(!grid) return;
  if(list.length===0){
    grid.innerHTML = `<div class="col-span-full glass p-10 text-center"><i class="fa-solid fa-box-open text-4xl neon-text"></i><p class="mt-3 text-gray-400">No products match your filters.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(productCardHTML).join('');
  initRevealAnimations();
}

/* CART / WISHLIST */
function addToCart(id, qty=1, animate=true){
  const p = state.products.find(x=>x.id===id);
  if(!p) return;
  if(p.stock<=0){ toast('Out of stock'); return; }
  const ex = state.cart.find(c=>c.id===id);
  if(ex) ex.qty += qty; else state.cart.push({id,qty});
  save(STORAGE.cart, state.cart);
  updateBadges();
  toast(`${p.name} added to cart`);
  if(animate){
    const cartBtn = document.querySelector('[title="Cart"]');
    if(cartBtn) cartBtn.animate([{transform:'scale(1)'},{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:500});
  }
}
function removeFromCart(id){ state.cart = state.cart.filter(c=>c.id!==id); save(STORAGE.cart,state.cart); updateBadges(); renderDrawer('cart'); }
function changeQty(id,d){ const c = state.cart.find(c=>c.id===id); if(!c) return; c.qty = Math.max(1,c.qty+d); save(STORAGE.cart,state.cart); updateBadges(); renderDrawer('cart'); }
function toggleWish(id, btn){
  const i = state.wishlist.indexOf(id);
  if(i>-1){ state.wishlist.splice(i,1); toast('Removed from wishlist'); }
  else { state.wishlist.push(id); toast('Added to wishlist 💖'); }
  save(STORAGE.wishlist,state.wishlist);
  updateBadges();
  if(btn) btn.classList.toggle('active');
  document.querySelectorAll(`.heart-btn`).forEach(b=>{
    const card = b.closest('.product-card');
    if(card && card.dataset.id===id) b.classList.toggle('active', state.wishlist.includes(id));
  });
}
function updateBadges(){
  const cc = document.getElementById('cartCount'); if(cc) cc.textContent = state.cart.reduce((s,c)=>s+c.qty,0);
  const wc = document.getElementById('wishCount'); if(wc) wc.textContent = state.wishlist.length;
}
function buyNow(id){ addToCart(id,1,false); navigate('checkout'); }
function cartTotal(){ return state.cart.reduce((s,c)=>{ const p=state.products.find(x=>x.id===c.id); return s+(p?p.price*c.qty:0)},0); }

function renderDrawer(type){
  const titleEl = document.getElementById('drawerTitle');
  const body = document.getElementById('drawerBody');
  const foot = document.getElementById('drawerFooter');

  if(type==='cart'){
    titleEl.textContent = 'Your Cart';

      body.innerHTML = `<div class="text-center mt-16"><i class="fa-solid fa-cart-shopping text-5xl text-gray-500"></i><p class="mt-4 text-gray-400">Your cart is empty</p><button class="btn-neon mt-5" onclick="closeDrawer();navigate('shop')">Start Shopping</button></div>`;
      foot.innerHTML = '';
      return;
    }
    body.innerHTML = state.cart.map(c=>{
      const p = state.products.find(x=>x.id===c.id); if(!p) return '';
      const img = p.image || (p.images && p.images[0]) || '';
      return `

function switchAuth(t){
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabSignup').classList.toggle('active', t==='signup');
  document.getElementById('authForm').innerHTML = authForm(t);
}
function authForm(t){
  if(t==='login') return `
    <label class="label">Email</label><input id="lEmail" class="input mb-3" placeholder="you@email.com">
    <label class="label">Password</label><input id="lPass" type="password" class="input mb-4" placeholder="Enter password">
    <button class="btn-neon w-full justify-center" onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
  `;
  return `
    <label class="label">Full Name</label><input id="sName" class="input mb-3">
    <label class="label">Email</label><input id="sEmail" class="input mb-3">
    <label class="label">Password</label><input id="sPass" type="password" class="input mb-4">
    <button class="btn-neon w-full justify-center" onclick="signup()"><i class="fa-solid fa-user-plus"></i> Create Account</button>
  `;
}
function login(){
  const e = document.getElementById('lEmail').value.trim().toLowerCase();
  const p = document.getElementById('lPass').value;
  if(!e||!p){ toast('Enter email & password'); return; }
  // Admin login check (master admin email or current adminCreds)
  if(e === state.adminCreds.email.toLowerCase() && p === state.adminCreds.password){
    state.adminLogged = true; save(STORAGE.admin, true);
    toast('Welcome, Admin');
    closeDrawer();
    navigate('admin');
    return;
  }
  // Regular user login
  const user = state.users.find(u=>u.email.toLowerCase()===e && u.password===p);
  if(user){
    state.user = {name:user.name, email:user.email};
    save(STORAGE.user, state.user);
    toast('Welcome back, '+user.name+'!');
    renderDrawer('account');
  } else {
    toast('Invalid email or password');
  }
}
function signup(){
  const n = document.getElementById('sName').value.trim();
  const e = document.getElementById('sEmail').value.trim();
  const p = document.getElementById('sPass').value;
  if(!n||!e||!p){ toast('Fill all fields'); return; }
  if(p.length<4){ toast('Password too short'); return; }
  if(state.users.find(u=>u.email.toLowerCase()===e.toLowerCase())){ toast('Email already registered'); return; }
  if(e.toLowerCase()===state.adminCreds.email.toLowerCase()){ toast('This email is reserved'); return; }
  state.users.push({name:n, email:e, password:p, joined:Date.now()});
  save(STORAGE.users, state.users);
  state.user = {name:n, email:e};
  save(STORAGE.user, state.user);
  toast('Account created!');
  renderDrawer('account');
}
function logout(){ state.user=null; save(STORAGE.user,null); toast('Logged out'); renderDrawer('account'); }
function logoutAdmin(){ state.adminLogged=false; save(STORAGE.admin,false); toast('Admin logged out'); closeDrawer(); navigate('home'); }

/* CHANGE PASSWORD MODAL */
function openChangePasswordModal(type){
  const isAdmin = type==='admin';
  const html = `
    <div class="p-6">
      <div class="flex justify-between items-center mb-5">
        <h3 class="font-display text-xl"><i class="fa-solid fa-key neon-text"></i> Change ${isAdmin?'Admin ':''}Password</h3>
        <button class="btn-ghost !p-2 !px-3" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <label class="label">Current Password</label>
      <input id="cpCurr" type="password" class="input mb-3" placeholder="Enter current password">
      <label class="label">New Password</label>
      <input id="cpNew" type="password" class="input mb-3" placeholder="Min 4 characters">
      <label class="label">Confirm New Password</label>
      <input id="cpConfirm" type="password" class="input mb-5" placeholder="Re-enter new password">
      <div class="flex justify-end gap-2">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-neon" onclick="changePassword('${type}')"><i class="fa-solid fa-save"></i> Update Password</button>
      </div>
    </div>`;
  openModal(html);
}
function changePassword(type){
  const curr = document.getElementById('cpCurr').value;
  const np = document.getElementById('cpNew').value;
  const cf = document.getElementById('cpConfirm').value;
  if(!curr||!np||!cf){ toast('Fill all fields'); return; }
  if(np.length<4){ toast('Password too short'); return; }
  if(np!==cf){ toast('Passwords do not match'); return; }

  if(type==='admin'){
    if(curr !== state.adminCreds.password){ toast('Current password incorrect'); return; }
    state.adminCreds = {...state.adminCreds, password: np};
    save(STORAGE.adminCreds, state.adminCreds);
    toast('Admin password updated successfully');
    closeModal();
  } else {
    const user = state.users.find(u=>u.email.toLowerCase()===state.user.email.toLowerCase());
    if(!user){ toast('User not found'); return; }
    if(user.password !== curr){ toast('Current password incorrect'); return; }
    user.password = np;
    save(STORAGE.users, state.users);
    toast('Password updated successfully');
    closeModal();
  }
}

function placeOrder(){

  const addr = document.getElementById('cAddr').value.trim();
  const city = document.getElementById('cCity').value;
  if(!name||!phone||!addr){ toast('Please fill required fields'); return; }
  const items = state.cart.map(c=>{ const p = state.products.find(x=>x.id===c.id); return {id:c.id,name:p?.name,qty:c.qty,price:p?.price}; });
  const order = {
    id:'VX'+Date.now().toString().slice(-8),
    name, phone, address:addr, city,
    province: document.getElementById('cProv').value,
    zip: document.getElementById('cZip').value,
    payment: document.querySelector('input[name=pay]:checked').value,
    items, total: cartTotal(),
    status:'pending', date:new Date().toISOString(),
    customerEmail: state.user?.email || ''
  };
  state.orders.unshift(order);
  save(STORAGE.orders, state.orders);
  state.cart = []; save(STORAGE.cart,state.cart); updateBadges();
  showOrderSuccess(order);
}

        <div class="sm:col-span-2"><label class="label">Available Text</label><input id="pmAvail" class="input" value="${p?.available||'In stock — Pakistan'}"></div>

      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-neon" onclick="saveProduct('${id||''}')"><i class="fa-solid fa-save"></i> Save</button>
      </div>
    </div>`;
  openModal(html);
}
function saveProduct(id){
  const specsRaw = document.getElementById('pmSpecs').value.trim();
  const specs = {};
  specsRaw.split('\n').forEach(l=>{ const m = l.split(':'); if(m.length>=2) specs[m[0].trim()] = m.slice(1).join(':').trim(); });
  const imagesRaw = document.getElementById('pmImages').value.trim();
  const images = imagesRaw ? imagesRaw.split('\n').map(s=>s.trim()).filter(Boolean) : [];
  const mainImage = document.getElementById('pmImage').value.trim();
  if(mainImage && !images.includes(mainImage)) images.unshift(mainImage);

  const newP = {
    id: id||('p'+Date.now()),
    name: document.getElementById('pmName').value.trim(),
    brand: document.getElementById('pmBrand').value.trim(),
    category: document.getElementById('pmCat').value,
    price: +document.getElementById('pmPrice').value,
    oldPrice: +document.getElementById('pmOld').value,
    stock: +document.getElementById('pmStock').value,
    rating: +document.getElementById('pmRating').value,
    description: document.getElementById('pmDesc').value,
    image: mainImage || (images[0]||''),
    images: images,
    available: document.getElementById('pmAvail').value,
    specs
  };
  if(!newP.name){ toast('Name required'); return; }
  if(id){
    const i = state.products.findIndex(p=>p.id===id);
    if(i>-1) state.products[i] = newP;
  } else state.products.unshift(newP);
  save(STORAGE.products, state.products);
  toast(id?'Product updated':'Product added');
  closeModal();
  adminRenderBody();
}

function aiRecommend(n=3){
  return state.products.slice()
    .sort((a,b)=> (b.rating*1.5 + (1/(b.stock+1))*0.4 + Math.random()*0.5) - (a.rating*1.5 + (1/(a.stock+1))*0.4 + Math.random()*0.5))

}

/* REVEAL */
function initRevealAnimations(){
  const els = document.querySelectorAll('.reveal');
  if(!els.length) return;
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }});
  },{threshold:.12});
  els.forEach(el=>io.observe(el));
}
